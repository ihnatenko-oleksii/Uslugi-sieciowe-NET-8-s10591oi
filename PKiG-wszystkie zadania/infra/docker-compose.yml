# musiałem dodać docker-compose.yml żeby móc odpalić bazę danych ms sql na MacOS
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pkig-sqlserver
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "Strong!Passw0rd123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver_data:
